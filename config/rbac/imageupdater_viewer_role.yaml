# This rule is not used by the project image-update-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to apps.github.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: image-update-operator
    app.kubernetes.io/managed-by: kustomize
  name: imageupdater-viewer-role
rules:
- apiGroups:
  - apps.github.com
  resources:
  - imageupdaters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps.github.com
  resources:
  - imageupdaters/status
  verbs:
  - get
